version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: famhealth
      POSTGRES_USER: famhealth
      POSTGRES_PASSWORD: famhealth
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    env_file:
      - .env.backend
    ports:
      - '8080:8080'
    depends_on:
      - postgres

volumes:
  pgdata:
